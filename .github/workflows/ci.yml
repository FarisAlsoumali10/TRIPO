name: Tripo Backend CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # 🚨 التعديل السحري: توجيه كل الأوامر لتعمل داخل مجلد الباك-إند
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json' # تحديد مسار ملف الحزم بدقة

    - name: Install Dependencies
      run: npm ci

    - name: Run TypeScript Type Checking
      run: npx tsc --noEmit