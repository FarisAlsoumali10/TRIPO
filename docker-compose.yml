version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: tripo-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: tripo
    volumes:
      - mongo-data:/data/db
    networks:
      - tripo-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tripo-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/tripo
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_EXPIRES_IN=7d
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - tripo-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tripo-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - tripo-network
    command: npm run dev

volumes:
  mongo-data:

networks:
  tripo-network:
    driver: bridge
