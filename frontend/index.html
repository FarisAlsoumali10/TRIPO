    <style>
      html { transition: background-color 0.3s, color 0.3s; }
      /* Shimmer keyframe for skeleton loaders */
      @keyframes shimmer { 100% { transform: translateX(100%); } }
      /* Smooth page transitions */
      .page-enter { animation: fadeSlideIn 0.2s ease-out; }
      @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
      /* Focus ring consistency */
      :focus-visible { outline: 2px solid var(--mint, #7CF7C8); outline-offset: 2px; border-radius: 8px; }
      /* Reduce motion for accessibility */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
      }
    </style>
    <style>
      /* Custom scrollbar hide for horizontal scrolling */

      }
